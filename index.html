<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoParts POS — Motor Parts Management System</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Custom Styles (VIEW) -->
  <link rel="stylesheet" href="assets/style/style.css">
</head>
<body>

<!-- -------VIEW — LOGIN PAGE--------->
<div id="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon">🔧</div>
      <h2>AutoParts POS</h2>
      <p>Motor Parts Management System</p>
    </div>

    <div class="form-group" style="margin-bottom:1.25rem">
      <label class="login-label">Username</label>
      <input type="text" id="loginUsername" class="login-input"
             placeholder="Enter username" autocomplete="username">
    </div>

    <div class="form-group" style="margin-bottom:1.5rem">
      <label class="login-label">Password</label>
      <div class="pass-wrapper">
        <input type="password" id="loginPassword" class="login-input"
               placeholder="Enter password" autocomplete="current-password">
        <button class="pass-toggle" id="passToggle" type="button">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" type="button">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
    <div class="hint-text">Default credentials: <strong>admin</strong> / <strong>admin123</strong></div>

  </div>
</div>

<!-- ------------ VIEW — MAIN APPLICATION--------------- -->
<div id="main-app">

  <!------SIDEBAR --------->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <div class="brand-icon">🔧</div>
      <div>
        <div class="brand-text">AutoParts</div>
        <div class="brand-sub">POS System</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <button class="sidebar-link active" data-section="dashboard">
        <i class="bi bi-speedometer2"></i><span>Dashboard</span>
      </button>
      <button class="sidebar-link" data-section="orders">
        <i class="bi bi-cart3"></i><span>New Order</span>
        <span class="nav-badge" id="cartCountBadge" style="display:none">0</span>
      </button>

      <div class="nav-section-label">Management</div>
      <button class="sidebar-link" data-section="customers">
        <i class="bi bi-people"></i><span>Customers</span>
      </button>
      <button class="sidebar-link" data-section="parts">
        <i class="bi bi-box-seam"></i><span>Parts / Items</span>
      </button>
      <button class="sidebar-link" data-section="orderhistory">
        <i class="bi bi-clock-history"></i><span>Order History</span>
      </button>
      <button class="sidebar-link" data-section="invoices">
        <i class="bi bi-receipt"></i><span>Invoices</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div>
          <div class="user-name">Admin</div>
          <div class="user-role">Cashier</div>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn" type="button">
        <i class="bi bi-box-arrow-left me-1"></i> Logout
      </button>
    </div>

  </aside>

  <!-- -----MAIN CONTENT---------- -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Dashboard</div>
      <div class="topbar-right">
        <div class="topbar-date">
          <i class="bi bi-calendar3 me-1"></i>
          <span id="topbarDate"></span>
        </div>
      </div>
    </div>

    <div class="page-content">


    </div>
    <!-- /page-content -->
  </main>


</div>
<!-- /main-app -->

<!-- External libs -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

<!-- imports all controllers -->
<script type="module" src="app.js"></script>

</body>
</html>
